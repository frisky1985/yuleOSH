# yuleASR AUTOSAR BSW Pipeline Configuration
# Generated by yuleOSH init-autosar

pipeline:
  name: autosar-bsw-pipeline
  version: "1.0.0"
  template: yuleasr

  # CI layers mapped to ASPICE process areas
  ci_layers:
    L1: [spec-parse, plan-lint, unit-test, misra-check]
    L2: [cross-compile, integration-test, static-analysis, requirements-trace]
    L3: [system-verification, compliance-report, evidence-pack]

  # Default pipeline steps when running `yuleosh pipeline run`
  default_steps:
    - spec-parse
    - requirements-analysis
    - sdd
    - code-gen
    - internal-review
    - test-plan
    - code-review
    - unit-test
    - cross-compile
    - static-analysis
    - system-verification

  # AUTOSAR-specific stages
  autosar:
    target_mcu: S32K312
    architecture: arm-cortex-m7

    # BSW layers to build
    bsw_layers:
      mcal:
        enabled: true
        modules:
          - Mcu
          - Dio
          - Port
          - Gpt
          - Can
          - Lin
          - Spi
          - Icu
          - Ocu
          - Pwm
          - Adc
          - Fls
          - Eep
          - Wdg
          - Eth
          - I2C
          - Uart
          - Crypto
          - Fee
          - Flash
          - RamTst
      ecual:
        enabled: true
        modules:
          - CanIf
          - CanNm
          - CanSm
          - CanTp
          - CanTrcv
          - LinIf
          - LinNm
          - LinSM
          - LinTp
          - LinTrcv
          - DoIP
          - EthIf
          - EthSm
          - EthTrcv
          - FrIf
          - FrTp
          - FiM
          - Srp
          - Ea
          - IoHwAb
          - IpduM
          - Fee
          - MemIf
          - WdgIf
          - SomeIpIf
          - SomeIpSd
          - Xcp
          - Dlt
          - J1939Tp
      services:
        enabled: true
        modules:
          - Com
          - ComM
          - Dcm
          - Dem
          - Det
          - EcuM
          - EcuC
          - BswM
          - SchM
          - NvM
          - PduR
          - CanM
          - CanSM
          - LinM
          - LinSM
          - EthSM
          - FiM
          - IpduM
          - E2E
          - Crc
          - CryIf
          - Csm
          - KeyM
          - SecOC
          - SoAd
          - SomeIp
          - SomeIpTp
          - SomeIpXf
          - StbM
          - WdgM
          - Xcp
          - Dlt
          - J1939Nm
          - J1939Tp
          - UdpNm
          - MemIf
          - Mem
          - Nm
          - SwC
          - LnTm
          - Mqtt
          - RamSafety
          - DoCan

    # Compilation settings
    compilation:
      standard: c99
      optimization: Os
      debug_symbols: true
      warnings: [all, extra, shadow, conversion, unused-parameter]
      defines:
        - USE_AUTOSAR_OS
        - S32K312

    # MISRA-C:2023 configuration
    misra:
      ruleset: c2023
      fail_on_error: true
      fail_on_warning: false
      suppress:
        - missingIncludeSystem
        - unmatchedSuppression

    # Cross-compilation
    cross_compile:
      target: arm-cortex-m7
      toolchain_prefix: arm-none-eabi-
      arch_flags:
        - -mcpu=cortex-m7
        - -mthumb
        - -mfpu=fpv5-sp-d16
        - -mfloat-abi=hard
      linker_script: s32k312.ld

  # ASPICE evidence generation
  evidence:
    enabled: true
    output_dir: evidence/
    formats:
      - markdown
      - json
    traceability:
      - requirements-to-design
      - design-to-implementation
      - implementation-to-test
