  GSCR-CPP-16.9:
    title: 在程序启动前，不得调用非 noexcept 的构造函数。
    severity: S1
    category: 异常处理
    description_en: Constructors that are not noexcept shall not be invoked before
      program startup.
    description_cn: 在程序启动前，不得调用非 noexcept 的构造函数。
    check_method: manual_review
