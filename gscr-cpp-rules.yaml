    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.16:
    title: 代码中显式抛出的每个异常，在所有可能导致该点的调用路径中，都应有一个兼容类型的处理程序。
    severity: S1
    category: 异常处理
    description_en: Each exception explicitly thrown in the code shall have a handler
      of a compatible type in all call paths that could lead to that point.
    description_cn: 代码中显式抛出的每个异常，在所有可能导致该点的调用路径中，都应有一个兼容类型的处理程序。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M15-1-3
    - C++ Core Guidelines E.14
    references_url:
