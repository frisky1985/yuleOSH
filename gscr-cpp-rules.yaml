    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.17:
    title: 在派生类及其部分或全部基类的单个try-catch语句或try块中提供多个处理程序时，处理程序的顺序应从最派生类到基类。
    severity: S2
    category: 异常处理
    description_en: Where multiple handlers are provided in a single try-catch statement
      or function-try-block for a derived class and some or all of its bases, the
      handlers shall be ordered most-derived to base class.
    description_cn: 在派生类及其部分或全部基类的单个try-catch语句或try块中提供多个处理程序时，处理程序的顺序应从最派生类到基类。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M15-Dir-1
    - C++ Core Guidelines E.14
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.18:
    title: 在单个try-catch语句或函数try块中提供多个处理程序时，任何省略号（捕获所有异常）处理程序都应放在最后。
    severity: S2
    category: 异常处理
    description_en: Where multiple handlers are provided in a single try-catch statement
      or function-try-block, any ellipsis (catch-all) handler shall occur last.
    description_cn: 在单个try-catch语句或函数try块中提供多个处理程序时，任何省略号（捕获所有异常）处理程序都应放在最后。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
