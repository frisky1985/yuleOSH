  GSCR-CPP-5.7:
    title: 整数表达式不得导致数据丢失。
    severity: S1
    category: 标准转换
    description_en: An integer expression shall not lead to data loss.
    description_cn: 整数表达式不得导致数据丢失。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
