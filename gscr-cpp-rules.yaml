    - misra-c2023-7.0.5
    profile: safety
  GSCR-CPP-5.5:
    title: 数值类型之间的赋值应恰当，避免潜在错误。
    severity: S1
    category: 标准转换
    description_en: Assignment between numeric types shall be appropriate.
    description_cn: 数值类型之间的赋值应恰当，避免潜在错误。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-7.0.6
    - misra-c2023-7.0.6
    profile: safety
  GSCR-CPP-5.6:
    title: nullptr 应为唯一的空指针常量形式。
    severity: S2
    category: 标准转换
    description_en: nullptr shall be the only form of the null-pointer-constant.
    description_cn: nullptr 应为唯一的空指针常量形式。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-7.11.1
    - misra-c2023-7.11.1
    profile: safety
