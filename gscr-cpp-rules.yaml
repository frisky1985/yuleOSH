    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.11:
    title: 主函数和任务主函数至少应捕获：所有使用的第三方库的基类异常、std::exception 以及所有其他未处理的异常。
    severity: S2
    category: 异常处理
    description_en: 'Main function and a task main function shall catch at least:
      base class exceptions from all third-party libraries used, std::exception and
      all otherwise unhandled exceptions.'
    description_cn: 主函数和任务主函数至少应捕获：所有使用的第三方库的基类异常、std::exception 以及所有其他未处理的异常。
    check_method: manual_review
