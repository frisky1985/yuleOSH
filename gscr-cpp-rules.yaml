    - https://isocpp.github.io/CppCoreGuidelines/
    - https://wiki.sei.cmu.edu/confluence/display/cplusplus/
  GSCR-CPP-1.10:
    title: 项目不得包含仅使用一次的非易失性POD变量。
    severity: S2
    category: 声明
    description_en: A project shall not contain non-volatile POD variables having
      only one use.
    description_cn: 项目不得包含仅使用一次的非易失性POD变量。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M0-1-2
    - C++ Core Guidelines ES.1
    - SEI CERT C++ MSC12-CPP
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
    - https://wiki.sei.cmu.edu/confluence/display/cplusplus/
  GSCR-CPP-1.11:
    title: 所有返回类型为 void 的函数都必须有外部副作用。
    severity: S1
    category: 语句
    description_en: All functions with void return type shall have external side effect(s).
    description_cn: 所有返回类型为 void 的函数都必须有外部副作用。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M0-1-4
    - C++ Core Guidelines F.10
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-1.12:
    title: 不应存在死代码。
    severity: S1
    category: 一般原则
    description_en: There shall be no dead code.
    description_cn: 不应存在死代码。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M0-1-1
    - C++ Core Guidelines ES.xx
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-1.13:
    title: 对象不得赋值给与之重叠的对象。
    severity: S1
    category: 表达式
    description_en: An object shall not be assigned to an overlapping object.
    description_cn: 对象不得赋值给与之重叠的对象。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M5-17-1
    - C++ Core Guidelines ES.43
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-1.14:
    title: 项目不得包含非易失性变量被赋予后续从未使用过的值的情况。
    severity: S2
    category: 声明
    description_en: A project shall not contain instances of non-volatile variables
      being given values that are never subsequently used.
    description_cn: 项目不得包含非易失性变量被赋予后续从未使用过的值的情况。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M0-1-2
    - C++ Core Guidelines ES.1
    - SEI CERT C++ MSC12-CPP
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
    - https://wiki.sei.cmu.edu/confluence/display/cplusplus/
  GSCR-CPP-2.1:
    title: 不应使用已弃用的特性。
    severity: S1
    category: 一般原则
    description_en: Deprecated features should not be used.
    description_cn: 不应使用已弃用的特性。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-4.1.2
    - misra-c2023-4.1.2
    profile: safety
  GSCR-CPP-2.2:
    title: 不应出现未定义行为或关键的未指定行为。
    severity: S1
    category: 一般原则
    description_en: There shall be no occurrence of undefined or critical unspecified
      behaviour.
    description_cn: 不应出现未定义行为或关键的未指定行为。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-4.1.3
    - misra-c2023-4.1.3
    profile: safety
  GSCR-CPP-2.3:
    title: 对内存位置的操作应恰当排序。
    severity: S1
    category: 一般原则
    description_en: Operations on a memory location shall be sequenced appropriately.
    description_cn: 对内存位置的操作应恰当排序。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-4.6.1
    - misra-c2023-4.6.1
    profile: safety
  GSCR-CPP-3.1:
    title: 在C风格注释中不应使用字符序列 /*。
    severity: S1
    category: 词法约定
    description_en: The character sequence /* shall not be used within a C-style comment.
    description_cn: 在C风格注释中不应使用字符序列 /*。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.7.1
    - misra-c2023-5.7.1
    profile: safety
  GSCR-CPP-3.2:
    title: 代码部分不应被“注释掉”。
    severity: S2
    category: 词法约定
    description_en: Sections of code should not be "commented out".
    description_cn: 代码部分不应被“注释掉”。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-5.7.2
    - misra-c2023-Dir-5.7.2
    profile: safety
    severity_rationale: MISRA Required规则，但注释风格属于编码约定而非安全关键，降级为S2
  GSCR-CPP-3.3:
    title: 在 // 注释中不应使用行拼接。
    severity: S2
    category: 词法约定
    description_en: Line-splicing shall not be used in // comments.
    description_cn: 在 // 注释中不应使用行拼接。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.7.3
    - misra-c2023-5.7.3
    profile: safety
    severity_rationale: MISRA Required规则，但注释风格属于编码约定而非安全关键，降级为S2
  GSCR-CPP-3.4:
    title: 用户定义的标识符应具有适当的格式。
    severity: S2
    category: 词法约定
    description_en: User-defined identifiers shall have an appropriate form.
    description_cn: 用户定义的标识符应具有适当的格式。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.10.1
    - misra-c2023-5.10.1
    profile: safety
    severity_rationale: MISRA Required规则，但该规则在特定控制流模式下误报率较高，降级为S2
  GSCR-CPP-3.5:
    title: 无符号整数字面量应适当添加后缀（U/u）。
    severity: S2
    category: 词法约定
    description_en: Unsigned integer literals shall be appropriately suffixed.
    description_cn: 无符号整数字面量应适当添加后缀（U/u）。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.13.4
    - misra-c2023-5.13.4
    profile: safety
    severity_rationale: MISRA Required规则，经评审该规则在特定上下文中不适用或工具误报率较高，降级为S2
  GSCR-CPP-3.6:
    title: 字面量后缀的首字符不应使用 L 的小写形式。
    severity: S2
    category: 词法约定
    description_en: The lowercase form of L shall not be used as the first character
      in a literal suffix.
    description_cn: 字面量后缀的首字符不应使用 L 的小写形式。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.13.5
    - misra-c2023-5.13.5
    profile: safety
    severity_rationale: MISRA Required规则，但字面量后缀风格属于编码风格约定，降级为S2
  GSCR-CPP-3.7:
    title: long long 类型的整数字面量，其后缀中不得仅使用单个 L 或 l。
    severity: S2
    category: 词法约定
    description_en: An integer-literal of type long long shall not use a single L
      or l in any suffix.
    description_cn: long long 类型的整数字面量，其后缀中不得仅使用单个 L 或 l。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.13.6
    - misra-c2023-5.13.6
    profile: safety
    severity_rationale: MISRA Required规则，经评审该规则在特定上下文中不适用或工具误报率较高，降级为S2
  GSCR-CPP-3.8:
    title: 在内部作用域中声明的标识符不得隐藏在外部作用域中声明的标识符。
    severity: S2
    category: 词法约定
    description_en: An identifier declared in an inner scope shall not hide an identifier
      declared in an outer scope.
    description_cn: 在内部作用域中声明的标识符不得隐藏在外部作用域中声明的标识符。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-10-1
    - C++ Core Guidelines ES.12
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.9:
    title: 具有静态存储期的非成员对象或静态函数的标识符名称不得在命名空间内重用。
    severity: S1
    category: 词法约定
    description_en: The identifier name of a non-member object with static storage
      duration or static function shall not be reused within a namespace.
    description_cn: 具有静态存储期的非成员对象或静态函数的标识符名称不得在命名空间内重用。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-10-2
    - C++ Core Guidelines ES.12
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.10:
    title: 具有静态存储期的函数或具有外部或内部链接的非成员对象的标识符名称不应被重用。
    severity: S1
    category: 词法约定
    description_en: An identifier name of a function with static storage duration
      or a non-member object with external or internal linkage should not be reused.
    description_cn: 具有静态存储期的函数或具有外部或内部链接的非成员对象的标识符名称不应被重用。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-10-3
    - C++ Core Guidelines SF.2
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.11:
    title: 在同一作用域内，类或枚举名称不得被变量、函数或枚举器声明隐藏。
    severity: S1
    category: 词法约定
    description_en: A class or enumeration name shall not be hidden by a variable,
      function or enumerator declaration in the same scope.
    description_cn: 在同一作用域内，类或枚举名称不得被变量、函数或枚举器声明隐藏。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-10-4
    - C++ Core Guidelines ES.12
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.12:
    title: 不得使用wchar_t类型。
    severity: S2
    category: 词法约定
    description_en: Type wchar_t shall not be used.
    description_cn: 不得使用wchar_t类型。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-13-3
    - C++ Core Guidelines SL.str.5
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.13:
    title: 字符串字面量不得赋值给非常量指针。
    severity: S1
    category: 词法约定
    description_en: String literals shall not be assigned to non-constant pointers.
    description_cn: 字符串字面量不得赋值给非常量指针。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-13-4
    - C++ Core Guidelines ES.25
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.14:
    title: 字面后缀必须大写。
    severity: S2
    category: 词法约定
    description_en: Literal suffixes shall be upper case.
    description_cn: 字面后缀必须大写。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
