    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.15:
    title: typedef名称（包括限定符，如果有的话）必须是唯一标识符。
    severity: S1
    category: 词法约定
    description_en: A typedef name (including qualification, if any) shall be a unique
      identifier.
    description_cn: typedef名称（包括限定符，如果有的话）必须是唯一标识符。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-10-5
    - C++ Core Guidelines ES.xx
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.16:
    title: 类、联合或枚举名称（包括限定符，如果有的话）必须是唯一标识符。
    severity: S1
    category: 词法约定
    description_en: A class, union or enum name (including qualification, if any)
      shall be a unique identifier.
    description_cn: 类、联合或枚举名称（包括限定符，如果有的话）必须是唯一标识符。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-10-6
    - C++ Core Guidelines C.xx
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-3.17:
    title: 如果一个标识符引用了一个类型，那么在同一作用域内，它不得再引用一个对象或函数。
    severity: S1
    category: 词法约定
    description_en: If an identifier refers to a type, it shall not also refer to
      an object or a function in the same scope.
    description_cn: 如果一个标识符引用了一个类型，那么在同一作用域内，它不得再引用一个对象或函数。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M2-10-7
    - C++ Core Guidelines ES.12
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-4.1:
    title: 标识符 main 不应用于除全局 main 函数之外的其他函数。
    severity: S0
    category: 基本概念
    description_en: The identifier main shall not be used for a function other than
      the global function main.
    description_cn: 标识符 main 不应用于除全局 main 函数之外的其他函数。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
