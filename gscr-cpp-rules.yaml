  GSCR-CPP-16.8:
    title: 如果一个函数因异常而退出，那么在抛出异常之前，该函数应将其构造的所有对象/资源置于有效状态，或者将其删除。
    severity: S1
    category: 异常处理
    description_en: If a function exits with an exception, then before a throw, the
      function shall place all objects/resources that the function constructed in
      valid states or it shall delete them.
    description_cn: 如果一个函数因异常而退出，那么在抛出异常之前，该函数应将其构造的所有对象/资源置于有效状态，或者将其删除。
    check_method: manual_review
