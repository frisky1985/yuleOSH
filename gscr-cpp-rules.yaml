    - misra-c2023-6.0.4
    profile: safety
  GSCR-CPP-4.2:
    title: 不应违反定义唯一原则。
    severity: S1
    category: 基本概念
    description_en: The one-definition rule shall not be violated.
    description_cn: 不应违反定义唯一原则。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.2.1
    - misra-c2023-6.2.1
    profile: safety
  GSCR-CPP-4.3:
    title: 变量或函数的所有声明应具有相同的类型。
    severity: S1
    category: 基本概念
    description_en: All declarations of a variable or function shall have the same
      type.
    description_cn: 变量或函数的所有声明应具有相同的类型。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.2.2
    - misra-c2023-6.2.2
    profile: safety
  GSCR-CPP-4.4:
    title: 变量，类型，函数和模板只能在合适的位置定义一次。
    severity: S1
    category: 基本概念
    description_en: The source code used to implement an entity shall appear only
      once.
    description_cn: 变量，类型，函数和模板只能在合适的位置定义一次。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.2.3
    - misra-c2023-6.2.3
    profile: safety
  GSCR-CPP-4.5:
    title: 头文件不应包含非内联的、具有外部链接的函数或对象的定义。
    severity: S1
    category: 基本概念
    description_en: A header file shall not contain definitions of functions or objects
      that are non-inline and have external linkage.
    description_cn: 头文件不应包含非内联的、具有外部链接的函数或对象的定义。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.2.4
    - misra-c2023-6.2.4
    profile: safety
  GSCR-CPP-4.6:
    title: 内部作用域中声明的变量不应隐藏外部作用域中声明的变量。
    severity: S2
    category: 基本概念
    description_en: A variable declared in an inner scope shall not hide a variable
      declared in an outer scope.
    description_cn: 内部作用域中声明的变量不应隐藏外部作用域中声明的变量。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.4.1
    - misra-c2023-6.4.1
    profile: safety
    severity_rationale: MISRA Required规则，但在特定设计模式（如适配器模式）中变量隐藏难以完全避免
  GSCR-CPP-4.7:
    title: 派生类不应隐藏继承自其基类中的函数。
    severity: S1
    category: 基本概念
    description_en: Derived classes shall not conceal functions that are inherited
      from their bases.
    description_cn: 派生类不应隐藏继承自其基类中的函数。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.4.2
    - misra-c2023-6.4.2
    profile: safety
  GSCR-CPP-4.8:
    title: 具有外部链接的函数或对象应在头文件中声明。
    severity: S1
    category: 基本概念
    description_en: A function or object with external linkage should be introduced
      in a header file.
    description_cn: 具有外部链接的函数或对象应在头文件中声明。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.5.1
    - misra-c2023-6.5.1
    profile: safety
  GSCR-CPP-4.9:
    title: 不得访问超出生命周期的对象。
    severity: S1
    category: 基本概念
    description_en: An object shall not be accessed outside of its lifetime.
    description_cn: 不得访问超出生命周期的对象。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.8.1
    - misra-c2023-6.8.1
    profile: safety
  GSCR-CPP-4.10:
    title: 函数不得返回指向具有自动存储期的局部变量的引用或指针。
    severity: S0
    category: 基本概念
    description_en: A function must not return a reference or a pointer to a local
      variable with automatic storage duration.
    description_cn: 函数不得返回指向具有自动存储期的局部变量的引用或指针。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.8.2
    - misra-c2023-6.8.2
    profile: safety
  GSCR-CPP-4.11:
    title: 赋值运算符不得将自动存储期对象的地址赋给生命周期更长的对象。
    severity: S0
    category: 基本概念
    description_en: An assignment operator shall not assign the address of an object
      with automatic storage duration to an object with a greater lifetime.
    description_cn: 赋值运算符不得将自动存储期对象的地址赋给生命周期更长的对象。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.8.3
    - misra-c2023-6.8.3
    profile: safety
  GSCR-CPP-4.12:
    title: 相同实体的所有声明中应使用相同的类型别名。
    severity: S2
    category: 基本概念
    description_en: The same type aliases shall be used in all declarations of the
      same entity.
    description_cn: 相同实体的所有声明中应使用相同的类型别名。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.9.1
    - misra-c2023-6.9.1
    profile: safety
    severity_rationale: MISRA Required规则，但在大型代码库中类型别名一致性检查工具覆盖有限
  GSCR-CPP-4.13:
    title: 函数定义仅当满足以下条件时才应置于类定义中：(1) 该函数旨在内联；(2) 它是成员函数模板；(3) 它是类模板的成员函数。
    severity: S2
    category: 基本概念
    description_en: A function definition shall only be placed in a class definition
      if (1) the function is intended to be inlined (2) it is a member function template
      (3) it is a member function of a class template.
    description_cn: 函数定义仅当满足以下条件时才应置于类定义中：(1) 该函数旨在内联；(2) 它是成员函数模板；(3) 它是类模板的成员函数。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M3-3-2
    - C++ Core Guidelines C.5
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-4.14:
    title: 静态对象和线程局部对象应进行常量初始化。
    severity: S2
    category: 基本概念
    description_en: Static and thread-local objects shall be constant-initialized.
    description_cn: 静态对象和线程局部对象应进行常量初始化。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M3-6-1
    - C++ Core Guidelines CP.3
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-4.15:
    title: 函数不得在块作用域中声明。
    severity: S1
    category: 基本概念
    description_en: Functions shall not be declared at block scope.
    description_cn: 函数不得在块作用域中声明。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M3-3-2
    - C++ Core Guidelines SF.7
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-4.16:
    title: 在多个翻译单元中使用的类型、对象或函数，必须在且仅在一个文件中声明。
    severity: S2
    category: 基本概念
    description_en: A type, object or function that is used in multiple translation
      units shall be declared in one and only one file.
    description_cn: 在多个翻译单元中使用的类型、对象或函数，必须在且仅在一个文件中声明。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M3-1-2
    - C++ Core Guidelines SF.2
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-5.1:
    title: 不应将bool类型转换为其他类型。
    severity: S1
    category: 标准转换
    description_en: There shall be no conversion from type bool.
    description_cn: 不应将bool类型转换为其他类型。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-7.0.1
    - misra-c2023-7.0.1
    profile: safety
  GSCR-CPP-5.2:
    title: 不应将其他类型转换为 bool 类型。
    severity: S1
    category: 标准转换
    description_en: There shall be no conversion to type bool.
    description_cn: 不应将其他类型转换为 bool 类型。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-7.0.2
    - misra-c2023-7.0.2
    profile: safety
  GSCR-CPP-5.3:
    title: 位运算符和移位运算符应使用合适的操作数。
    severity: S1
    category: 标准转换
    description_en: The operands of bitwise operators and shift operators shall be
      appropriate.
    description_cn: 位运算符和移位运算符应使用合适的操作数。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-7.0.4
    - misra-c2023-7.0.4
    profile: safety
  GSCR-CPP-5.4:
    title: 操作数的符号性和类型类别不应因整数提升或常规算术转换而改变。
    severity: S1
    category: 标准转换
    description_en: Integral promotion and the usual arithmetic conversions shall
      not change the signedness or the type category of an operand.
    description_cn: 操作数的符号性和类型类别不应因整数提升或常规算术转换而改变。
    check_method: clang-tidy
    auto_checkable: true
