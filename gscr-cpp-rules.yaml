  GSCR-CPP-16.15:
    title: throw语句的赋值表达式本身不得引发异常。
    severity: S1
    category: 异常处理
    description_en: The assignment-expression of a throw statement shall not itself
      cause an exception to be thrown.
    description_cn: throw语句的赋值表达式本身不得引发异常。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
