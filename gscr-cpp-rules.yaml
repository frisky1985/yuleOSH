    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.14:
    title: 不得使用goto或switch语句将控制权转移到try或catch块中。
    severity: S2
    category: 异常处理
    description_en: Control shall not be transferred into a try or catch block using
      a goto or a switch statement.
    description_cn: 不得使用goto或switch语句将控制权转移到try或catch块中。
