    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.12:
    title: 如果一个函数被声明为 noexcept、noexcept(true) 或 noexcept(<true condition>)，那么它不应因异常而退出。
    severity: S1
    category: 异常处理
    description_en: If a function is declared to be noexcept, noexcept(true) or noexcept(<true
      condition>), then it shall not exit with an exception.
    description_cn: 如果一个函数被声明为 noexcept、noexcept(true) 或 noexcept(<true condition>)，那么它不应因异常而退出。
    check_method: manual_review
    auto_checkable: false
