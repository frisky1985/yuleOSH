    - https://wiki.sei.cmu.edu/confluence/display/cplusplus/
  GSCR-CPP-5.8:
    title: 类型为布尔型的表达式不得用作除赋值操作符 =、逻辑操作符 &&、||、!、等号操作符 == 和!=、一元操作符 & 以及条件操作符之外的内置操作符的操作数。
    severity: S1
    category: 标准转换
    description_en: Expressions with type bool shall not be used as operands to built-in
      operators other than the assignment operator =, the logical operators &&, ||,
      !, the equality operators == and ! =, the unary & operator, and the conditional
      operator.
    description_cn: 类型为布尔型的表达式不得用作除赋值操作符 =、逻辑操作符 &&、||、!、等号操作符 == 和!=、一元操作符 & 以及条件操作符之外的内置操作符的操作数。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M5-3-2
    - C++ Core Guidelines ES.87
    references_url:
    - https://www.autosar.org/fileadmin/standards/R22-11/AP/AUTOSAR_AP_RS_C++14_Coding_Guidelines.pdf
    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-6.1:
    title: 应使用括号适当地明确表达式的含义。
    severity: S2
    category: 表达式
    description_en: Parentheses should be used to make the meaning of an expression
      appropriately explicit.
    description_cn: 应使用括号适当地明确表达式的含义。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.0.1
    - misra-c2023-8.0.1
    profile: safety
    severity_rationale: MISRA Required规则，但表达式优先级的显式化属于风格偏好，降级为S2
  GSCR-CPP-6.2:
    title: 不应使用 C 风格转换和函数式强制转换。
    severity: S2
    category: 表达式
    description_en: C-style casts and functional notation casts shall not be used.
    description_cn: 不应使用 C 风格转换和函数式强制转换。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2.2
    - misra-c2023-8.2.2
    profile: safety
    severity_rationale: MISRA Required规则，但在与C语言API兼容时允许有限的C风格转换
  GSCR-CPP-6.3:
    title: 转换不应移除通过指针或引用访问的类型的任何 const 或 volatile 限定符。
    severity: S1
    category: 表达式
    description_en: A cast shall not remove any const or volatile qualification from
      the type accessed via a pointer or by reference.
    description_cn: 转换不应移除通过指针或引用访问的类型的任何 const 或 volatile 限定符。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2.3
    - misra-c2023-8.2.3
    profile: safety
  GSCR-CPP-6.4:
    title: 不应在函数指针和任何其他类型之间进行转换。
    severity: S1
    category: 表达式
    description_en: Casts shall not be performed between a pointer to function and
      any other type.
    description_cn: 不应在函数指针和任何其他类型之间进行转换。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2.4
    - misra-c2023-8.2.4
    profile: safety
  GSCR-CPP-6.5:
    title: 整型、枚举型或 void 指针类型对象不应被转换为指针类型。
    severity: S1
    category: 表达式
    description_en: An object with integral, enumerated, or pointer to void type shall
      not be cast to a pointer type.
    description_cn: 整型、枚举型或 void 指针类型对象不应被转换为指针类型。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2.6
    - misra-c2023-8.2.6
    profile: safety
  GSCR-CPP-6.6:
    title: 不应将指针类型转换为整数类型。
    severity: S1
    category: 表达式
    description_en: A cast should not convert a pointer type to an integral type.
    description_cn: 不应将指针类型转换为整数类型。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2.7
    - misra-c2023-8.2.7
    profile: safety
  GSCR-CPP-6.7:
    title: 函数不应直接或间接地调用自身。
    severity: S1
    category: 表达式
    description_en: Functions shall not call themselves, either directly or indirectly.
    description_cn: 函数不应直接或间接地调用自身。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2.10
    - misra-c2023-8.2.10
    profile: safety
  GSCR-CPP-6.8:
    title: 通过省略号传递的参数应具有适当的类型。
    severity: S2
    category: 表达式
    description_en: An argument passed via ellipsis shall have an appropriate type.
    description_cn: 通过省略号传递的参数应具有适当的类型。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2.11
    - misra-c2023-8.2.11
    profile: safety
    severity_rationale: MISRA Required规则，但省略号参数在可变参数API中难以完全避免
  GSCR-CPP-6.9:
    title: 指针运算不应产生无效指针。
    severity: S1
    category: 表达式
    description_en: Pointer arithmetic shall not form an invalid pointer.
    description_cn: 指针运算不应产生无效指针。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.7.1
    - misra-c2023-8.7.1
    profile: safety
  GSCR-CPP-6.10:
    title: 指针之间的减法运算只应用于指向同一数组元素的指针。
    severity: S1
    category: 表达式
    description_en: Subtraction between pointers shall only be applied to pointers
      that address elements of the same array.
    description_cn: 指针之间的减法运算只应用于指向同一数组元素的指针。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.7.2
    - misra-c2023-8.7.2
    profile: safety
  GSCR-CPP-6.11:
    title: 内置的关系运算符 >、>=、< 和 <= 不应用于指针类型的对象，除非它们指向同一数组的元素。
    severity: S0
    category: 表达式
    description_en: The built-in relational operators >, >=, < and <= shall not be
      applied to objects of pointer type, except where they point to elements of the
      same array.
    description_cn: 内置的关系运算符 >、>=、< 和 <= 不应用于指针类型的对象，除非它们指向同一数组的元素。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.9.1
    - misra-c2023-8.9.1
    profile: safety
  GSCR-CPP-6.12:
    title: 逻辑 && 或 || 运算符的右操作数不应包含持久的副作用。
    severity: S1
    category: 表达式
    description_en: The right-hand operand of a logical && or || operator should not
      contain persistent side effects.
    description_cn: 逻辑 && 或 || 运算符的右操作数不应包含持久的副作用。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.14.1
    - misra-c2023-8.14.1
    profile: safety
  GSCR-CPP-6.13:
    title: 不得将对象或子对象复制到重叠的对象上。
    severity: S0
    category: 表达式
    description_en: An object or subobject must not be copied to an overlapping object.
    description_cn: 不得将对象或子对象复制到重叠的对象上。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.18.1
    - misra-c2023-8.18.1
    profile: safety
  GSCR-CPP-6.14:
    title: 不应使用赋值运算符的返回结果。
