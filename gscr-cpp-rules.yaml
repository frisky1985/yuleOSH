    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.10:
    title: 如果构造函数不是 noexcept 且无法完成对象初始化，则它应释放对象的资源并抛出异常。
    severity: S1
    category: 异常处理
    description_en: If a constructor is not noexcept and the constructor cannot finish
      object initialization, then it shall deallocate the object's resources and it
      shall throw an exception.
    description_cn: 如果构造函数不是 noexcept 且无法完成对象初始化，则它应释放对象的资源并抛出异常。
    check_method: manual_review
