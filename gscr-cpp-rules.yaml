rules:
  GSCR-CPP-1.2:
    title: 条件表达式不应为恒定值。
    severity: S1
    category: 一般原则
    description_en: Controlling expressions should not be invariant.
    description_cn: 条件表达式不应为恒定值。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-0.0.2
    - misra-c2023-0.0.2
    profile: safety
  GSCR-CPP-1.3:
    title: 变量被赋值后，新值应该被使用。
    severity: S2
    category: 语句
    description_en: A value should not be unnecessarily written to a local object.
    description_cn: 变量被赋值后，新值应该被使用。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-0.1.1
    - misra-c2023-0.1.1
    profile: safety
    severity_rationale: MISRA Required规则，经评审该规则在特定上下文中不适用或工具误报率较高，降级为S2
  GSCR-CPP-1.4:
    title: 函数返回的值应当被使用。
    severity: S1
    category: 语句
    description_en: The value returned by a function shall be used.
    description_cn: 函数返回的值应当被使用。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-0.1.2
    - misra-c2023-0.1.2
    profile: safety
  GSCR-CPP-1.5:
    title: 可见性受限的变量至少应被使用一次。
    severity: S2
    category: 声明
    description_en: Variables with limited visibility should be used at least once.
    description_cn: 可见性受限的变量至少应被使用一次。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-0.2.1
    - misra-c2023-0.2.1
    profile: safety
    severity_rationale: MISRA Required规则，经评审该规则在特定上下文中不适用或工具误报率较高，降级为S2
  GSCR-CPP-1.6:
    title: 命名的函数参数应至少使用一次。
    severity: S2
    category: 声明
    description_en: A named function parameter shall be used at least once.
    description_cn: 命名的函数参数应至少使用一次。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-0.2.2
    - misra-c2023-0.2.2
    profile: safety
    severity_rationale: MISRA Required规则，经评审该规则在特定上下文中不适用或工具误报率较高，降级为S2
  GSCR-CPP-1.7:
    title: 浮点运算应适当使用。
    severity: S2
    category: 表达式
    description_en: Floating-point arithmetic should be used appropriately.
    description_cn: 浮点运算应适当使用。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-0.3.1
    - misra-c2023-Dir-0.3.1
    profile: safety
    severity_rationale: MISRA Required规则，经评审该规则在特定上下文中不适用或工具误报率较高，降级为S2
  GSCR-CPP-1.8:
    title: 函数调用不应违反函数的前置条件。
    severity: S1
    category: 语句
    description_en: A function call shall not violate the function's preconditions.
    description_cn: 函数调用不应违反函数的前置条件。
    check_method: clang-tidy
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-0.3.2
    - misra-c2023-Dir-0.3.2
    profile: safety
  GSCR-CPP-1.9:
    title: 使用数学函数时，应检查范围、定义域和极点错误。
    severity: S1
    category: 语句
    description_en: Range, domain and pole errors shall be checked when using math
      functions.
    description_cn: 使用数学函数时，应检查范围、定义域和极点错误。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
    - AUTOSAR C++14 M0-3-1
    - C++ Core Guidelines ES.46
    - SEI CERT C++ FLC37-CPP
    references_url:
