    - https://isocpp.github.io/CppCoreGuidelines/
  GSCR-CPP-16.13:
    title: 所有用户提供的类析构函数、内存释放函数、移动构造函数、移动赋值操作符和交换函数不得因异常而退出。应适当地为这些函数添加 noexcept 异常规范。
    severity: S2
    category: 异常处理
    description_en: All user-provided class destructors, deallocation functions, move
      constructors, move assignment operators and swap functions shall not exit with
      an exception. A noexcept exception specification shall be added to these functions
      as appropriate.
    description_cn: 所有用户提供的类析构函数、内存释放函数、移动构造函数、移动赋值操作符和交换函数不得因异常而退出。应适当地为这些函数添加 noexcept
      异常规范。
    check_method: manual_review
    auto_checkable: false
    mapped_misra_ids: []
    profile: safety
    references:
