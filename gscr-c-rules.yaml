meta:
  standard: GSCR
  language: C
  version: '1.1'
  ruleset_version: 1.1.0
  rules_total: 186
rules:
  GSCR-C-2.1:
    title: 所有源文件不能存在任何编译错误
    severity: S1
    category: 编译和构建
    description_en: All source files shall compil without any compilation errors
    description_cn: 所有源文件不能存在任何编译错误
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-2.1
    - misra-c2023-Dir-2.1
    profile: safety
  GSCR-C-3.1:
    title: 所有代码应可追溯至需求文档
    severity: S1
    category: 需求可追溯性
    description_en: All code shall be traceable to documented requirements
    description_cn: 所有代码应可追溯至需求文档
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-3.1
    - misra-c2023-Dir-3.1
    profile: safety
  GSCR-C-4.1:
    title: 应尽量减少运行时故障
    severity: S1
    category: 编码设计
    description_en: Run-time failures shall be minimized
    description_cn: 应尽量减少运行时故障
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.1
    - misra-c2023-Dir-4.1
    profile: safety
  GSCR-C-4.2:
    title: 汇编语言应该封装和隔离
    severity: S1
    category: 编码设计
    description_en: Assembly language shall be encapsulated and isolated
    description_cn: 汇编语言应该封装和隔离
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.3
    - misra-c2023-Dir-4.3
    profile: safety
  GSCR-C-4.3:
    title: 如果函数返回错误信息，则应测试该错误信息
    severity: S1
    category: 编码设计
    description_en: If a function returns error information, then that error information shall be tested
    description_cn: 如果函数返回错误信息，则应测试该错误信息
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.7
    - misra-c2023-Dir-4.7
    profile: safety
  GSCR-C-4.4:
    title: 应采取预防措施，以防止头文件的内容被包含多次
    severity: S1
    category: 编码设计
    description_en: Precautions shall be taken in order to prevent the contents of aheader flebeing included more than once
    description_cn: 应采取预防措施，以防止头文件的内容被包含多次
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.10
    - misra-c2023-Dir-4.10
    profile: safety
  GSCR-C-4.5:
    title: 传递给库函数的值的有效性应进行检查
    severity: S1
    category: 编码设计
    description_en: The validity of values passed to library functions shal1 be checked
    description_cn: 传递给库函数的值的有效性应进行检查
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.11
    - misra-c2023-Dir-4.11
    profile: safety
  GSCR-C-4.6:
    title: 不应使用动态内存分配
    severity: S1
    category: 编码设计
    description_en: Dynamic memory allocation shall not be used
    description_cn: 不应使用动态内存分配
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.12
    - misra-c2023-Dir-4.12
    profile: safety
  GSCR-C-4.7:
    title: 汇编语言的所有用法都应该文档化
    severity: S2
    category: 编码设计
    description_en: All usage language documented
    description_cn: 汇编语言的所有用法都应该文档化
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.2
    - misra-c2023-Dir-4.2
    profile: safety
    severity_rationale: MISRA Required规则，经评审该规则在特定上下文中不适用或工具误报率较高，降级为S2
  GSCR-C-4.8:
    title: 代码不应该注释掉
    severity: S2
    category: 编码设计
    description_en: Sections of code should not be "commented out"
    description_cn: 代码不应该注释掉
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.4
    - misra-c2023-Dir-4.4
    profile: safety
    severity_rationale: MISRA Required规则，但注释掉的代码在开发阶段有合理的调试用途，降级为S2
  GSCR-C-4.9:
    title: 在同一命名空间的标识符命名应该是清晰无歧义的。
    severity: S2
    category: 编码设计
    description_en: Identifiers in the same name space with overlapping visibility should be typographically unambiguous
    description_cn: 在同一命名空间的标识符命名应该是清晰无歧义的。
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.5
    - misra-c2023-Dir-4.5
    profile: safety
    severity_rationale: MISRA Required规则，但命名清晰度属于编码规范而非安全关键，降级为S2
  GSCR-C-4.10:
    title: 应该使用指示了长度和有无符号的typedef来定义新的类型，而不要直接使用基本类型。
    severity: S2
    category: 编码设计
    description_en: typedefs that indicate size and signedness should be used in place of the basic numerical types
    description_cn: 应该使用指示了长度和有无符号的typedef来定义新的类型，而不要直接使用基本类型。
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.6
    - misra-c2023-Dir-4.6
    profile: safety
    severity_rationale: MISRA Required规则，但类型定义风格属于编码约定，降级为S2
  GSCR-C-4.11:
    title: 如果指向结构或联合的指针在翻译单元中从解引用，那么对象的实现应该隐藏起来
    severity: S2
    category: 编码设计
    description_en: If a pointer to a structure or union is never dereferenced within a translation unit. then the implementation
      of the object should be hidden
    description_cn: 如果指向结构或联合的指针在翻译单元中从解引用，那么对象的实现应该隐藏起来
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.8
    - misra-c2023-Dir-4.8
    profile: safety
    severity_rationale: MISRA Required规则，但在接口封装模式中存在指针未解引用的合理场景
  GSCR-C-4.12:
    title: 当函数和类似函数的宏是可互换的时候，应该优先使用函数
    severity: S2
    category: 编码设计
    description_en: A function should be used in preference to a function-like macro where they are interchangeable
    description_cn: 当函数和类似函数的宏是可互换的时候，应该优先使用函数
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.9
    - misra-c2023-Dir-4.9
    profile: safety
    severity_rationale: MISRA Required规则，但宏在嵌入式硬件抽象层有广泛的合理用途
  GSCR-C-4.13:
    title: 提供资源操作的函数应按照适当的顺序被调用
    severity: S2
    category: 编码设计
    description_en: Functions which are designed to provide operations on a resource should be called in an appropriate sequence
    description_cn: 提供资源操作的函数应按照适当的顺序被调用
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-Dir-4.13
    - misra-c2023-Dir-4.13
    profile: safety
    severity_rationale: MISRA Required规则，但资源操作顺序依赖于具体API设计，降级为S2
  GSCR-C-5.1:
    title: 程序不应包含任何违反标准C语法和约束的内容，也不应超出实现的翻译限制
    severity: S1
    category: 标准C语言环境
    description_en: The program shall contain no violations ofthe tandard C syntax and constraints, and shall not exceed the
      implementation's translation limnits
    description_cn: 程序不应包含任何违反标准C语法和约束的内容，也不应超出实现的翻译限制
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-1.1
    - misra-c2023-1.1
    profile: safety
  GSCR-C-5.2:
    title: 不得出现未定义或未指定的关键行为
    severity: S1
    category: 标准C语言环境
    description_en: There shall be no occurrence of undefned or critical unspecified behaviour
    description_cn: 不得出现未定义或未指定的关键行为
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-1.3
    - misra-c2023-1.3
    profile: safety
  GSCR-C-5.3:
    title: 不应该使用语言扩展
    severity: S2
    category: 标准C语言环境
    description_en: Language extensions should not be used
    description_cn: 不应该使用语言扩展
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-1.2
    - misra-c2023-1.2
    profile: safety
    severity_rationale: MISRA Required规则，但语言扩展在特定编译器和嵌入式平台中难以完全避免
  GSCR-C-6.1:
    title: 项目不应包含不可到达的代码
    severity: S1
    category: 未使用的代码
    description_en: A project shall not contain unreachable code
    description_cn: 项目不应包含不可到达的代码
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-2.1
    - misra-c2023-2.1
    profile: safety
  GSCR-C-6.2:
    title: 不应该有死代码
    severity: S1
    category: 未使用的代码
    description_en: There shall be no dead code
    description_cn: 不应该有死代码
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-2.2
    - misra-c2023-2.2
    profile: safety
  GSCR-C-6.3:
    title: 项目不应包含未使用的类型声明
    severity: S2
    category: 未使用的代码
    description_en: A project should not contain unused type declarations
    description_cn: 项目不应包含未使用的类型声明
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-2.3
    - misra-c2023-2.3
    profile: safety
    severity_rationale: MISRA Required规则，但在快速原型或自动生成代码中存在合理的未使用声明
  GSCR-C-6.4:
    title: 项目不应该包含未使用的tag声明
    severity: S2
    category: 未使用的代码
    description_en: A project should not contain unused tag declarations
    description_cn: 项目不应该包含未使用的tag声明
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-2.4
    - misra-c2023-2.4
    profile: safety
    severity_rationale: MISRA Required规则，但在快速原型或自动生成代码中存在合理的未使用声明
  GSCR-C-6.5:
    title: 项目不应包含未使用的宏声明
    severity: S2
    category: 未使用的代码
    description_en: A project should not contain unused macro declarations
    description_cn: 项目不应包含未使用的宏声明
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-2.5
    - misra-c2023-2.5
    profile: safety
    severity_rationale: MISRA Required规则，但宏在嵌入式硬件抽象层有广泛的合理用途
  GSCR-C-6.6:
    title: 函数不应该包含未使用的label 声明
    severity: S2
    category: 未使用的代码
    description_en: A function should not contain unused label declarations
    description_cn: 函数不应该包含未使用的label 声明
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-2.6
    - misra-c2023-2.6
    profile: safety
    severity_rationale: MISRA Required规则，但在快速原型或自动生成代码中存在合理的未使用声明
  GSCR-C-6.7:
    title: 函数不应该包含未使用的参数
    severity: S2
    category: 未使用的代码
    description_en: There should be no unused parameters in functions
    description_cn: 函数不应该包含未使用的参数
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-2.7
    - misra-c2023-2.7
    profile: safety
    severity_rationale: MISRA Required规则，但在快速原型或自动生成代码中存在合理的未使用声明
  GSCR-C-7.1:
    title: 字符序列/*和//不应在注释中使用
    severity: S1
    category: 注泽
    description_en: The character sequences/ and /shall not be used within a comment
    description_cn: 字符序列/*和//不应在注释中使用
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-3.1
    - misra-c2023-3.1
    profile: safety
  GSCR-C-7.2:
    title: //注释中不能使用行拼接
    severity: S1
    category: 注泽
    description_en: Line-splicing shall not be used in/comments
    description_cn: //注释中不能使用行拼接
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-3.2
    - misra-c2023-3.2
    profile: safety
  GSCR-C-8.1:
    title: 应终止八进制和十六进制转义序列
    severity: S1
    category: 字符集和约定词汇
    description_en: Octal and hexadecimal escape sequences shall be terminated
    description_cn: 应终止八进制和十六进制转义序列
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-4.1
    - misra-c2023-4.1
    profile: safety
  GSCR-C-8.2:
    title: 不应该使用三字字符
    severity: S2
    category: 字符集和约定词汇
    description_en: Trigraphs should not be used
    description_cn: 不应该使用三字字符
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-4.2
    - misra-c2023-4.2
    profile: safety
    severity_rationale: MISRA Required规则，但三字字符在现代编译器中已基本淘汰
  GSCR-C-9.1:
    title: 在相同范围和名称空间中声明的标识符应是不同的
    severity: S1
    category: 标识符
    description_en: Identifiers declared in the same scope and name space shall be distinct
    description_cn: 在相同范围和名称空间中声明的标识符应是不同的
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.2
    - misra-c2023-5.2
    profile: safety
  GSCR-C-9.2:
    title: 在内部范围内声明的标识符不得隐藏在外部范围内声明的标识符
    severity: S1
    category: 标识符
    description_en: An identifier declared in an inner scope shall not hide an identifier declared in an outer scope
    description_cn: 在内部范围内声明的标识符不得隐藏在外部范围内声明的标识符
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.3
    - misra-c2023-5.3
    profile: safety
  GSCR-C-9.3:
    title: 宏标识符应该是独立的
    severity: S1
    category: 标识符
    description_en: MMacro identifers shall be distinet
    description_cn: 宏标识符应该是独立的
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.4
    - misra-c2023-5.4
    profile: safety
  GSCR-C-9.4:
    title: 标识符应该与宏名不同
    severity: S1
    category: 标识符
    description_en: Identifiers shall be distinct from macro names
    description_cn: 标识符应该与宏名不同
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.5
    - misra-c2023-5.5
    profile: safety
  GSCR-C-9.5:
    title: typedef名称应该是唯一的标识符
    severity: S1
    category: 标识符
    description_en: A typedef name shall be a unique identifier
    description_cn: typedef名称应该是唯一的标识符
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.6
    - misra-c2023-5.6
    profile: safety
  GSCR-C-9.6:
    title: 标签名称应当是唯一的标识符
    severity: S1
    category: 标识符
    description_en: A tag name shall be a unique identifier
    description_cn: 标签名称应当是唯一的标识符
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.7
    - misra-c2023-5.7
    profile: safety
  GSCR-C-9.7:
    title: 定义具有外部链接的对象或函数的标识符应该是唯一的
    severity: S1
    category: 标识符
    description_en: Identifiers that define objects or functions with external linkage shall be unique
    description_cn: 定义具有外部链接的对象或函数的标识符应该是唯一的
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.8
    - misra-c2023-5.8
    profile: safety
  GSCR-C-9.8:
    title: 外部标识符应该是独立的
    severity: S2
    category: 标识符
    description_en: External identifiers shall be distinct
    description_cn: 外部标识符应该是独立的
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.1
    - misra-c2023-5.1
    profile: safety
    severity_rationale: MISRA Required规则，但在大型代码库中外部标识符唯一性难以100%保证
  GSCR-C-9.9:
    title: 定义具有内部链接的对象或函数的标识符应该是唯一的
    severity: S2
    category: 标识符
    description_en: Identifiers that define objects or functions with interal linkage should be unique
    description_cn: 定义具有内部链接的对象或函数的标识符应该是唯一的
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-5.9
    - misra-c2023-5.9
    profile: safety
    severity_rationale: MISRA Required规则，但在大型代码库中外部标识符唯一性难以100%保证
  GSCR-C-10.1:
    title: bit 字段只能用适当的类型声明
    severity: S1
    category: 类型
    description_en: Bit-fields shall only be declared with an appropriate type
    description_cn: bit 字段只能用适当的类型声明
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.1
    - misra-c2023-6.1
    profile: safety
  GSCR-C-10.2:
    title: 单bit命名的bit字段不应该是带符号的类型
    severity: S1
    category: 类型
    description_en: Single-bit named bit fields shall not be of a signed type
    description_cn: 单bit命名的bit字段不应该是带符号的类型
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-6.2
    - misra-c2023-6.2
    profile: safety
  GSCR-C-12.1:
    title: 类型应明确指定。
    severity: S1
    category: 声明和定义
    description_en: Types shall be explicitly specified
    description_cn: 类型应明确指定。
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.1
    - misra-c2023-8.1
    profile: safety
  GSCR-C-12.2:
    title: 函数类型应该是带有命名参数的原型形式
    severity: S1
    category: 声明和定义
    description_en: Function types shall be in prototype form with named parameters
    description_cn: 函数类型应该是带有命名参数的原型形式
    check_method: cppcheck
    auto_checkable: true
    mapped_misra_ids:
    - misra-c2012-8.2
    - misra-c2023-8.2
    profile: safety
  GSCR-C-12.3:
    title: 对象或函数的所有声明都应使用相同的名称和类型限定符
    severity: S1
    category: 声明和定义
    description_en: All declarations of an object or function shall use the type same names and qualifiers
