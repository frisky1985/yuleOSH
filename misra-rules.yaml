  spec_ref: CRIT-BUF-001
  check_method: cppcheck
  auto_checkable: true
  profile: safety
  cppcheck_check: arrayIndexOutOfBounds,bufferAccessOutOfBounds,uninitstring
  c2023_change: new
  c2012_ref: N/A
crit-safe-null-deref:
  title: 空指针解引用
  severity: required
