  auto_checkable: true
  profile: safety
  cppcheck_check: selfAssignment,recurseCount
  c2023_change: new
  c2012_ref: N/A
crit-safe-infinite-loop:
  title: 死循环
  severity: required
  category: P0-CRITICAL
