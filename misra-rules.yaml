  spec_ref: CRIT-STK-001
  check_method: cppcheck
  auto_checkable: true
  profile: safety
  cppcheck_check: allocaCalled,autoVariables
  c2023_change: new
  c2012_ref: N/A
crit-safe-memory-leak:
