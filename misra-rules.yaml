meta:
  standard: MISRA C
  version: '2023'
  description: MISRA C:2023 Guidelines for the use of the C language in critical systems
  source: MISRA Consortium
misra-c2023-1.1:
  title: ISO C standard compliance
  severity: required
  category: 环境 (Environment)
  description: 所有代码应符合 ISO C 标准，不得使用编译器扩展
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-1.2:
  title: No reliance on undefined or unspecified behavior
  severity: required
  category: 环境 (Environment)
  description: 不得依赖未定义或未指定的行为
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-1.3:
  title: No violation of syntax or constraints
  severity: required
  category: 环境 (Environment)
  description: 不得违反 C 标准的语法或约束规则
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-2.1:
  title: Source files shall only contain legal C constructs
  severity: required
  category: 未分类 (Uncategorized)
  description: 源文件应仅包含合法的 C 语言结构
  spec_ref: SWE-MISRA-S1; SWE-MISRA-DEV1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-2.2:
  title: Source code shall not contain dead code
  severity: required
  category: 未分类 (Uncategorized)
  description: 源代码不得包含死代码（无法到达的代码）
  spec_ref: SWE-MISRA-S1; SWE-MISRA-DEV1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-2.3:
  title: Source code shall not contain unused type declarations
  severity: advisory
  category: 未分类 (Uncategorized)
  description: 源代码不得包含未使用的类型声明
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-2.4:
  title: Source code shall not contain unused tag declarations
  severity: advisory
  category: 未分类 (Uncategorized)
  description: 源代码不得包含未使用的标记声明
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-2.5:
  title: Source code shall not contain unused macro declarations
  severity: advisory
  category: 未分类 (Uncategorized)
  description: 源代码不得包含未使用的宏定义
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-2.6:
  title: Source code shall not contain labels not referenced
  severity: required
  category: 未分类 (Uncategorized)
  description: 源代码不得包含未引用的标签
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-2.7:
  title: Source code shall not contain functions not called
  severity: required
  category: 未分类 (Uncategorized)
  description: 源代码不得包含未被调用的函数
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-3.1:
  title: Character sequences in comments shall not begin with /*
  severity: required
  category: 注释 (Comments)
  description: 注释内的字符序列不能以 /* 开头，以防止嵌套注释
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-4.1:
  title: Octal and hex escape sequences shall be terminated
  severity: required
  category: 字符集 (Character Sets)
  description: 八进制和十六进制转义序列必须正确终止
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.1:
  title: Identifiers shall be distinct from keywords
  severity: required
  category: 标识符 (Identifiers)
  description: 标识符必须与关键字区分
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.2:
  title: Identifiers in same scope shall be distinct
  severity: required
  category: 标识符 (Identifiers)
  description: 同一作用域内的标识符应唯一
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.3:
  title: Typedef names shall not be reused
  severity: required
  category: 标识符 (Identifiers)
  description: typedef 名称不得重复使用
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.4:
  title: Macro identifiers shall be distinct
  severity: required
  category: 标识符 (Identifiers)
  description: 宏标识符应唯一
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.5:
  title: Identifiers shall be distinct from macro names
  severity: required
  category: 标识符 (Identifiers)
  description: 标识符应与宏名称区分
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.6:
  title: Typedef names shall be unique identifiers
  severity: required
  category: 标识符 (Identifiers)
  description: typedef 名称应是唯一标识符
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.7:
  title: Identifiers shall not rely on significance of characters
  severity: required
  category: 标识符 (Identifiers)
  description: 标识符不应依赖于区分大小写以外的字符区分
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.8:
  title: Identifiers in external scope shall be distinct
  severity: required
  category: 标识符 (Identifiers)
  description: 外部作用域的标识符应唯一
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-5.9:
  title: Identifiers of internal linkage shall be unique
  severity: required
  category: 标识符 (Identifiers)
  description: 内部链接的标识符应唯一
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-6.1:
  title: Bit fields shall only be of appropriate types
  severity: required
  category: 类型 (Types)
  description: 位域仅应使用适当的类型
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-6.2:
  title: Single-bit named bit fields shall be of unsigned type
  severity: required
  category: 类型 (Types)
  description: 单比特位域必须是无符号类型
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-7.1:
  title: Octal constants shall not be used
  severity: required
  category: 字面量 (Literals)
  description: 不得使用八进制常量
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-7.2:
  title: U or u suffix on unsigned integer constants
  severity: required
  category: 字面量 (Literals)
  description: 无符号整数常量应使用 U 或 u 后缀
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.1:
  title: Types shall be explicitly specified
  severity: required
  category: 声明 (Declarations)
  description: 类型应被显式指定
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG2
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.2:
  title: Function types shall be in prototype form
  severity: required
  category: 声明 (Declarations)
  description: 函数类型应使用原型形式声明
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG2
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.3:
  title: Objects declared at file scope shall have external linkage
  severity: required
  category: 声明 (Declarations)
  description: 文件作用域对象应具有外部链接或使用 static
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG2
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.4:
  title: Compatible declaration shall be visible
  severity: required
  category: 声明 (Declarations)
  description: 兼容声明应对所有 translation units 可见
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.5:
  title: External definitions shall be declared in header files
  severity: required
  category: 声明 (Declarations)
  description: 外部定义应在头文件中声明
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.6:
  title: Identifier shall be defined
  severity: required
  category: 声明 (Declarations)
  description: 标识符必须被定义
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.7:
  title: Functions and objects should not be defined with external linkage
  severity: advisory
  category: 声明 (Declarations)
  description: 除非必要，函数和对象不应使用外部链接定义（优先用 static）
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.8:
  title: Static storage class specifier in declarations
  severity: required
  category: 声明 (Declarations)
  description: 内部链接的函数和对象应使用 static 声明
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.9:
  title: Internal linkage objects shall have static storage
  severity: required
  category: 声明 (Declarations)
  description: 内部链接的对象应具有静态存储期
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.10:
  title: Static objects shall not exceed reasonable size
  severity: required
  category: 声明 (Declarations)
  description: 静态对象不应超过合理大小
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.11:
  title: External arrays shall have explicit size or initializer
  severity: required
  category: 声明 (Declarations)
  description: 外部数组应具有显式大小或初始化器
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-8.12:
  title: Array dimensions should be explicit
  severity: advisory
  category: 声明 (Declarations)
  description: 数组维度应是显式的
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-9.1:
  title: All automatic objects shall be initialized before use
  severity: required
  category: 初始化 (Initialization)
  description: 所有自动存储期对象在使用前应被赋值
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG2
  check_method: cppcheck
  auto_checkable: true
misra-c2023-9.2:
  title: Braces in initializer lists
  severity: required
  category: 初始化 (Initialization)
  description: 初始化列表中的括号应正确匹配
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-9.3:
  title: Designated initializers shall not be mixed
  severity: required
  category: 初始化 (Initialization)
  description: 不得混用指定初始化和位置初始化
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-9.4:
  title: Elements referenced in an initializer shall be available
  severity: required
  category: 初始化 (Initialization)
  description: 初始化器中引用的元素应可用
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-9.5:
  title: Designated initializers for arrays shall be in order
  severity: required
  category: 初始化 (Initialization)
  description: 数组的指定初始化器应按顺序
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.1:
  title: Operands shall not be of inappropriate type
  severity: required
  category: 基本类型 (Essential Types)
  description: 操作数不得具有不适当的本质类型
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG2
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.2:
  title: MISRA expressions of composite essential type
  severity: required
  category: 基本类型 (Essential Types)
  description: 复合本质类型的 MISRA 表达式
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.3:
  title: Complex integer types shall not be used
  severity: required
  category: 基本类型 (Essential Types)
  description: 复整数类型不得使用
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.4:
  title: Complex floating types shall not be used
  severity: required
  category: 基本类型 (Essential Types)
  description: 复浮点类型不得使用
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.5:
  title: Expression evaluation not affected by operator precedence
  severity: advisory
  category: 基本类型 (Essential Types)
  description: 表达式求值不应受优先级和求值顺序影响
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.6:
  title: Composite expression used as operand of further operators
  severity: required
  category: 基本类型 (Essential Types)
  description: 复合表达式用作运算符的操作数应加括号
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.7:
  title: Essential type model - expressions
  severity: required
  category: 基本类型 (Essential Types)
  description: 如果复合表达式用作更大的表达式操作数，应加括号明确
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-10.8:
  title: Casting should not remove const/volatile
  severity: required
  category: 基本类型 (Essential Types)
  description: 强制类型转换不应移除 const 或 volatile 限定
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.1:
  title: Conversions shall not be performed between pointers
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: 函数指针和对象指针之间不得进行转换
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.2:
  title: Pointer conversions to/from integer types
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: 指针和整数类型之间的转换应受限
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.3:
  title: Cast of pointer to integer type
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: 将指针转换为整数类型应谨慎
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.4:
  title: Cast of integer to pointer type
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: 将整数转换为指针类型应谨慎
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.5:
  title: Pointer to void shall not be converted to pointer to object
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: void 指针不应转换为对象指针（除赋值）
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.6:
  title: Cast between pointer to object and pointer to function
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: 对象指针和函数指针之间不得进行转换
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.7:
  title: Cast between pointer to object and non-integer arithmetic type
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: 对象指针和非整数算术类型之间不得进行转换
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-11.8:
  title: Pointer arithmetic limited to array elements
  severity: required
  category: 指针类型转换 (Pointer Type Conversions)
  description: 指针算术仅限于数组元素
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-12.1:
  title: Expression precedence with parentheses
  severity: required
  category: 表达式 (Expressions)
  description: 应使用括号明确表达式的运算符优先级
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG2
  check_method: cppcheck
  auto_checkable: true
misra-c2023-12.2:
  title: Value of expression shall be of appropriate essential type
  severity: required
  category: 表达式 (Expressions)
  description: 表达式的值应具有适当的本质类型
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-13.1:
  title: Side effects in initializer lists
  severity: required
  category: 副作用 (Side Effects)
  description: 初始化列表中不应有副作用
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-13.2:
  title: Side effects of called functions shall not depend on evaluation order
  severity: required
  category: 副作用 (Side Effects)
  description: 被调用函数的副作用不应依赖于求值顺序
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-13.3:
  title: Full expression with side effects shall not be discarded
  severity: required
  category: 副作用 (Side Effects)
  description: 具有副作用的完整表达式不应被丢弃
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-14.1:
  title: Loop counter shall be of appropriate type
  severity: required
  category: 控制流 (Control Flow)
  description: 循环计数器应具有适当类型
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-14.2:
  title: For loop shall contain well-formed expressions
  severity: required
  category: 控制流 (Control Flow)
  description: for 循环应包含完整的三个表达式
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-14.3:
  title: Loop counter shall not be modified in body
  severity: required
  category: 控制流 (Control Flow)
  description: 循环计数器不应在循环体中修改
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-14.4:
  title: Controlling expressions shall be essentially Boolean
  severity: required
  category: 控制流 (Control Flow)
  description: 控制表达式应为本质布尔类型
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-15.1:
  title: Goto statement shall not be used
  severity: required
  category: 控制流 (Control Flow)
  description: 不应使用 goto 语句
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-15.2:
  title: Goto statement should not be used
  severity: advisory
  category: 控制流 (Control Flow)
  description: 建议不要使用 goto 语句
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-15.3:
  title: Labels not part of switch case shall be avoided
  severity: required
  category: 控制流 (Control Flow)
  description: 不在 switch 中的标签不应使用
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-15.4:
  title: Single point of exit
  severity: advisory
  category: 控制流 (Control Flow)
  description: 函数应有单一退出点
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-15.5:
  title: Function shall not have multiple return statements
  severity: advisory
  category: 控制流 (Control Flow)
  description: 函数不应有多个 return 语句
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-15.6:
  title: If-else-if chain shall terminate with else
  severity: required
  category: 控制流 (Control Flow)
  description: if-else-if 链应以 else 子句终止
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-15.7:
  title: All if-else constructs shall be terminated
  severity: required
  category: 控制流 (Control Flow)
  description: 所有 if-else 结构应有 complete 形式
  spec_ref: SWE-MISRA-S1
  check_method: cppcheck
  auto_checkable: true
misra-c2023-16.1:
  title: Switch shall be well-formed
  severity: required
  category: 控制流 (Control Flow)
  description: switch 语句应格式正确
  spec_ref: SWE-MISRA-S1; SWE-MISRA-CFG2
  check_method: cppcheck
  auto_checkable: true
