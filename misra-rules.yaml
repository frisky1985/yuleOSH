  check_method: cppcheck
  auto_checkable: true
  profile: safety
  cppcheck_check: knownConditionTrueFalse,variableScope
  c2023_change: new
  c2012_ref: N/A
crit-safe-integer-overflow:
  title: 整型溢出
  severity: required
  category: P0-CRITICAL
