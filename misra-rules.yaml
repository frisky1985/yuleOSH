  severity: required
  category: P0-CRITICAL
  description: 检测 malloc 未对应 free。检测二次 free。
  spec_ref: CRIT-MEM-001
  check_method: cppcheck
  auto_checkable: true
  profile: safety
  cppcheck_check: memleak,leakReturnValNotUsed,doubleFree
  c2023_change: new
  c2012_ref: N/A
