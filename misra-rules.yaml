  auto_checkable: true
  profile: safety
  cppcheck_check: zerodiv,zerodivcond
  c2023_change: new
  c2012_ref: N/A
crit-safe-buffer-overflow:
  title: 缓冲区越界
  severity: required
  category: P0-CRITICAL
