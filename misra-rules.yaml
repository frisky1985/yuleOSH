  spec_ref: CRIT-NULL-001
  check_method: cppcheck
  auto_checkable: true
  profile: safety
  cppcheck_check: nullPointer,nullPointerRedundantCheck,returnDanglingLifetime
  c2023_change: new
  c2012_ref: N/A
crit-safe-recursion:
  title: 无限递归
  severity: required
