name: yuleOSH CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests with coverage gate
      run: |
        python -m pytest tests/ -q --ignore=tests/test_e2e.py --ignore=tests/test_e2e_pipeline.py --ignore=tests/test_alpha01_full_flow.py --ignore=tests/test_alpha02_onboarding.py --ignore=tests/test_onboarding_e2e.py --ignore=tests/ci/test_e2e_report_pipeline.py --cov=yuleosh --cov-fail-under=5

    - name: KG snapshot (P0-3)
      run: |
        python -m yuleosh.knowledge_graph.ci_hook \
          --build-id "ci-${{ github.run_id }}-${{ matrix.python-version }}" \
          --verbose || echo "KG snapshot failed (non-blocking, may need CI bootstrap)"
      env:
        OSH_HOME: ${{ github.workspace }}
      continue-on-error: true

    - name: Run CI Layer 1
      run: |
        python -m yuleosh.ci.run 1 || echo "CI L1 requires LLM API key, skipped"
      env:
        CI_RUN: "1"

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" 2>/dev/null || true
        pip install ruff bandit mypy coverage

    - name: Python Lint (ruff)
      run: |
        ruff check src/ --output-format=github || echo "ruff found issues (non-blocking)"
      continue-on-error: true

    - name: Security Scan (bandit)
      run: |
        bandit -r src/ -f sarif -o bandit-results.sarif || true
        bandit -r src/ -q || echo "bandit found issues (non-blocking)"
      continue-on-error: true

    - name: Type Check (mypy)
      run: |
        mypy src/ --ignore-missing-imports --warn-unused-configs --show-error-codes || echo "mypy found issues (non-blocking)"
      continue-on-error: true

    - name: Coverage Gate (fail-under=5)
      run: |
        E2E_IGNORES="--ignore=tests/test_e2e.py --ignore=tests/test_e2e_pipeline.py --ignore=tests/test_alpha01_full_flow.py --ignore=tests/test_alpha02_onboarding.py --ignore=tests/test_onboarding_e2e.py --ignore=tests/ci/test_e2e_report_pipeline.py"
        python -m yuleosh coverage gate --fail-under=5 || \
          python -c "import subprocess,sys; subprocess.run([sys.executable,'-m','coverage','run','--source=yuleosh','-m','pytest','tests/','-q',*'$E2E_IGNORES'.split(),'-x','--tb=short']); r2=subprocess.run([sys.executable,'-m','coverage','report','--fail-under=5']); sys.exit(r2.returncode)"

    - name: Coverage Regression Check
      run: |
        python -c "
import sys, json
sys.path.insert(0, 'src')
from yuleosh.ci.coverage_trend import record_coverage, check_coverage_regression

record_coverage('.')
reg = check_coverage_regression('.', line_drop_threshold=5.0, branch_drop_threshold=5.0, window=3)
if reg.get('regression'):
    print('⚠️  Regression alerts:')
    for a in reg.get('alerts', []):
        print(f'  • {a[\"message\"]}')
    print('Coverage regression detected (non-blocking)')
else:
    print('✅ No coverage regression detected')
"

    - name: Upload bandit SARIF
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: bandit-results.sarif
        category: bandit

  cve-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" pip-audit

    - name: Python CVE scan (pip-audit)
      run: |
        bash scripts/cve-scan.sh --python

    - name: Setup Node.js for npm audit
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Desktop npm audit
      run: |
        cd desktop && npm install --silent 2>/dev/null || true
        npm audit --audit-level=high || echo "npm audit found issues (non-blocking for desktop)"
      continue-on-error: true

    - name: Frontend npm audit
      run: |
        cd frontend && npm install --silent 2>/dev/null || true
        npm audit --audit-level=high || echo "npm audit found issues (non-blocking for frontend)"
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Run plan-lint
      run: |
        python -c "
        import os
        issues = 0
        for root, dirs, files in os.walk('.'):
            for f in files:
                if 'task' in f.lower() and f.endswith('.md'):
                    content = open(os.path.join(root, f)).read()
                    if not any(k in content.lower() for k in ['feature','bugfix','refactor','docs']):
                        print('⚠️  Missing kind: ' + os.path.join(root, f))
                        issues += 1
        if issues:
            exit(1)
        print('✅ plan-lint passed')
        "

  evidence:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: RTM Gate Check (ASPICE SWE.4)
      run: |
        bash docs/ci-rtm-check.sh 80 project-docs/spec.md tests/

    - name: Generate evidence pack
      run: |
    - name: Generate evidence pack
      run: |
        python -m yuleosh.evidence.pack || echo "Evidence pack requires API key, skipped"

    - name: Upload compliance pack
      uses: actions/upload-artifact@v4
      with:
        name: compliance-evidence
        path: .osh/evidence/
