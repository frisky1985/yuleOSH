# =============================================================================
# CodeQL Configuration — yuleOSH 深度安全分析
# =============================================================================

name: "yuleOSH CodeQL Configuration"

# 查询包来源
queries:
  # GitHub 官方的安全查询
  - uses: security-extended
  - uses: security-and-quality

  # 自定义查询（Python）
  - uses: ./.github/codeql-queries/python/taint-tracking.ql
  - uses: ./.github/codeql-queries/python/sensitive-leak.ql

  # 自定义查询（C/C++）
  - uses: ./.github/codeql-queries/cpp/buffer-overflow.ql
  - uses: ./.github/codeql-queries/cpp/memory-safety.ql

# 路径过滤
paths:
  - src

paths-ignore:
  - '**/__pycache__/**'
  - '**/node_modules/**'
  - '**/*.test.*'
  - '**/tests/**'
  - '**/migrations/**'
  - '**/ui/marketing/**'

# 查询严重度阈值
query-filters:
  - exclude:
      id:
        - py/clear-text-logging-sensitive-data
        - js/clear-text-logging-sensitive-data
  - include:
      severity: error
      security-severity: 7.0
