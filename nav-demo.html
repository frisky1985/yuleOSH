<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<style>.nav-blur{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}</style>
</head>
<body class="bg-[#0a0e17] text-[#e2e8f0]">

<nav class="fixed top-0 left-0 right-0 z-50 border-b border-[#1e293b]/60 nav-blur" style="background:rgba(10,14,23,.85)">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- LOGO -->
      <a href="/" class="flex items-center gap-2.5">
        <span class="text-2xl font-black tracking-tight">
          <span class="text-[#10b981]">yule</span><span class="text-[#3b82f6]">OSH</span>
        </span>
      </a>

      <!-- 中间导航 + 右侧登录 -->
      <div class="flex items-center gap-8">
        <!-- 导航链接 -->
        <div class="hidden md:flex items-center gap-6">
          <a href="#features" class="text-sm text-[#94a3b8] hover:text-[#e2e8f0] transition-colors">功能</a>
          <a href="#how-it-works" class="text-sm text-[#94a3b8] hover:text-[#e2e8f0] transition-colors">工作流</a>
          <a href="/pricing" class="text-sm text-[#94a3b8] hover:text-[#e2e8f0] transition-colors">定价</a>
          <a href="#faq" class="text-sm text-[#94a3b8] hover:text-[#e2e8f0] transition-colors">FAQ</a>
        </div>
        <!-- 右侧：GitHub + 登录 -->
        <div class="flex items-center gap-3">
          <a href="https://github.com/stefanji/yuleOSH" target="_blank"
             class="text-sm text-[#94a3b8] hover:text-white transition-colors flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
          </a>
          <a href="/login"
             class="text-sm px-4 py-2 rounded-lg border border-[#1e293b] text-[#e2e8f0] hover:border-[#1677ff]/40 hover:bg-[#1677ff]/5 transition-all"
          >登录</a>
          <a href="/dashboard"
             class="text-sm flex items-center gap-1.5 px-4 py-2 rounded-lg font-semibold bg-gradient-to-r from-[#722ed1] to-[#1677ff] text-white hover:from-[#722ed1]/90 hover:to-[#1677ff]/90 shadow-lg shadow-[#722ed1]/20 transition-all"
          >Dashboard →</a>
        </div>
      </div>

      <!-- Mobile -->
      <div class="md:hidden">
        <button class="p-2 rounded-lg border border-[#1e293b] text-[#94a3b8]">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="h-screen flex items-center justify-center px-4">
  <div class="text-center">
    <p class="text-lg text-[#94a3b8] mb-4">导航栏布局 demo</p>
    <p class="text-xs text-[#64748b]">左侧 Logo | 中间：功能 工作流 定价 FAQ | 右侧：GitHub + 登录 + Dashboard →</p>
  </div>
</div>

</body>
</html>
