version: '3.8'

services:
  yuleosh:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - yuleosh_data:/app/.yuleosh
      - ./projects:/app/projects:rw
    environment:
      - YULEOSH_DB=/app/.yuleosh/store.db
      - OSH_HOME=/app
      # Set YULEOSH_API_KEY to enable authentication
      # Uncomment and set a strong key for production:
      # - YULEOSH_API_KEY=your-secure-api-key-here
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  yuleosh_data:
