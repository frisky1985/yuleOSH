# yuleOSH Nginx server block — HTTP reverse proxy (dev/CI)
#
# Used in development and CI environments where TLS termination
# is handled separately or is not needed.
#
# In production the main nginx.conf handles HTTPS + redirect;
# this block provides the HTTP-only fallback for simpler deployments.

server {
    listen 80;
    server_name _;

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── API / Backend ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # ── Frontend / Static ──────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Deny access to sensitive paths ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ /(\.env|\.git|node_modules) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
