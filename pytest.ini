[pytest]
testpaths = tests
pythonpath = src
# CP-P2-02: All test files follow the test_*.py naming convention for consistency.
addopts = --cov=src/yuleosh --cov-report=term-missing --cov-report=html --cov-fail-under=5
markers =
    perf: Performance baseline tests (SWE.4-BP4)
    perf_spec: Spec parsing perf subgroup
    perf_evidence: Evidence collection perf subgroup
    perf_ci: CI config perf subgroup
    perf_api: API response time perf subgroup
    perf_mem: Memory baseline perf subgroup
    perf_integration: Integration perf subgroup
