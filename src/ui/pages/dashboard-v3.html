<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — yuleOSH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --card: #111111;
  --card-hover: #161616;
  --border: #1a1a1a;
  --border-active: #333;
  --text: #ededed;
  --text2: #888;
  --text3: #666;
  --green: #0ae285;
  --green-bg: rgba(10,226,133,.08);
  --blue: #0070f3;
  --blue-bg: rgba(0,112,243,.08);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,.08);
  --red: #ff4d4d;
  --purple: #7928ca;
  --purple-bg: rgba(121,40,202,.08);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.4);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sidebar-logo {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--green), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 32px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  color: var(--text2);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all .15s;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--green-bg); color: var(--green); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }

/* Main */
.main { flex: 1; padding: 32px 40px; max-width: 1200px; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}
.header-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.header-meta { display: flex; align-items: center; gap: 12px; }

/* Status Badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.status-live { background: var(--green-bg); color: var(--green); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-dot.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Stat Grid */
.stat-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  transition: all .2s;
}
.stat-card:hover { border-color: var(--border-active); box-shadow: var(--shadow-lg); }
.stat-card.primary { 
  background: linear-gradient(135deg, #0a0a0a 0%, #111 100%);
  border-color: rgba(10,226,133,.15);
}
.stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 600; margin-bottom: 8px; }
.stat-value { font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.stat-value.green { color: var(--green); }
.stat-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.stat-chart {
  height: 40px;
  margin-top: 12px;
  display: flex;
  align-items: flex-end;
  gap: 3px;
}
.stat-chart .bar {
  flex: 1;
  background: rgba(10,226,133,.15);
  border-radius: 2px 2px 0 0;
  transition: height .4s ease;
  min-height: 4px;
}

/* Pipeline Status */
.pipeline-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
  padding: 12px;
  background: rgba(255,255,255,.02);
  border-radius: var(--radius-sm);
  font-size: 13px;
}
.pipeline-stage {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
}
.pipeline-stage.done { background: var(--green); }
.pipeline-stage.running { background: var(--blue); animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.5} }

/* Section */
.section { margin-bottom: 32px; }
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 16px; font-weight: 600; }
.section-action {
  font-size: 13px;
  color: var(--text2);
  text-decoration: none;
  font-weight: 500;
  transition: color .15s;
}
.section-action:hover { color: var(--text); }

/* Project Cards */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.project-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-decoration: none;
  color: var(--text);
  transition: all .2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.project-card:hover {
  border-color: var(--border-active);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.project-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(400px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(10,226,133,.03), transparent 60%);
  opacity: 0;
  transition: opacity .3s;
}
.project-card:hover::after { opacity: 1; }
.project-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--green-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  margin-bottom: 12px;
}
.project-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.project-slug { font-size: 12px; color: var(--text3); font-family: 'SF Mono', 'Fira Code', monospace; }
.project-meta {
  display: flex; align-items: center; gap: 16px;
  margin-top: 12px; font-size: 12px; color: var(--text2);
}
.project-status {
  display: flex; align-items: center; gap: 4px;
}
.project-card.empty {
  border-style: dashed;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--text2);
  min-height: 160px;
}
.project-card.empty:hover { color: var(--text); border-color: var(--green); }
.empty-icon { font-size: 32px; opacity: .5; }

/* Activity Feed */
.activity-list { display: flex; flex-direction: column; gap: 2px; }
.activity-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  transition: background .15s;
}
.activity-item:hover { background: var(--card); }
.activity-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.activity-icon.pass { background: var(--green-bg); color: var(--green); }
.activity-icon.fail { background: rgba(255,77,77,.08); color: var(--red); }
.activity-time { color: var(--text3); margin-left: auto; font-size: 12px; }

/* Cmd+K modal */
.search-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  display: none; align-items: flex-start; justify-content: center; padding-top: 120px; z-index: 100;
}
.search-overlay.show { display: flex; }
.search-box {
  background: var(--card);
  border: 1px solid var(--border-active);
  border-radius: var(--radius);
  width: 480px;
  padding: 12px 16px;
}
.search-input {
  background: none; border: none; color: var(--text); font-size: 16px; font-family: inherit;
  width: 100%; outline: none;
}
.search-input::placeholder { color: var(--text3); }
.search-hint {
  font-size: 11px; color: var(--text3); margin-top: 8px;
  display: flex; gap: 8px;
}
.search-hint kbd {
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  padding: 1px 6px; border-radius: 4px; font-family: inherit;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 20px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">▲ yuleOSH</div>
    <a href="/dashboard" class="nav-item active"><span class="nav-icon">⌂</span> Dashboard</a>
    <a href="/projects" class="nav-item"><span class="nav-icon">⊞</span> Projects</a>
    <a href="/pipeline" class="nav-item"><span class="nav-icon">⇢</span> Pipeline</a>
    <a href="/evidence" class="nav-item"><span class="nav-icon">⊡</span> Evidence</a>
    <a href="/docs" class="nav-item"><span class="nav-icon">⌹</span> Docs</a>
    <div class="sidebar-footer">
      <a href="/pricing" class="nav-item"><span class="nav-icon">⬆</span> Upgrade</a>
      <a href="/settings" class="nav-item"><span class="nav-icon">⚙</span> Settings</a>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">
    <!-- Header -->
    <div class="header">
      <div>
        <h1 class="header-title" id="headerOrg">Demo Corp</h1>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">
          <span id="headerTier" class="status-badge status-live"><span class="status-dot"></span> Pro Trial</span>
          <span style="margin-left:8px" id="headerTrial"></span>
        </div>
      </div>
      <div class="header-meta">
        <button onclick="openSearch()" style="background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px">
          <span>⌘K</span> Search...
        </button>
        <span id="userEmail" style="font-size:13px;color:var(--text2)"></span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card primary" id="liveCard">
        <div class="stat-label">Pipeline Status</div>
        <div class="stat-value green" id="liveStatus">—</div>
        <div class="stat-sub" id="liveSub">No pipelines run yet</div>
        <div class="pipeline-bar" id="pipelineBar">
          <div class="pipeline-stage" id="stage1"></div>
          <div class="pipeline-stage" id="stage2"></div>
          <div class="pipeline-stage" id="stage3"></div>
          <div class="pipeline-stage" id="stage4"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Projects</div>
        <div class="stat-value" id="statProjects">—</div>
        <div class="stat-sub" id="statProjectsLimit"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pipeline Runs</div>
        <div class="stat-value" id="statRuns">—</div>
        <div class="stat-sub" id="statRunsLimit"></div>
        <div class="stat-chart" id="runChart"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">LLM Tokens</div>
        <div class="stat-value" id="statTokens">—</div>
        <div class="stat-sub" id="statTokensLimit"></div>
      </div>
    </div>

    <!-- Projects -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">Projects</h2>
        <a href="/onboarding" class="section-action">+ New Project →</a>
      </div>
      <div class="project-grid" id="projectList"></div>
    </div>

    <!-- Activity -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">Recent Activity</h2>
        <a href="/pipeline" class="section-action">View All →</a>
      </div>
      <div class="activity-list" id="activityFeed"></div>
    </div>
  </main>
</div>

<!-- Search -->
<div class="search-overlay" id="searchOverlay" onclick="closeSearch(event)">
  <div class="search-box" onclick="event.stopPropagation()">
    <input class="search-input" placeholder="Search projects, pipelines..." id="searchInput" onkeydown="if(event.key==='Escape')closeSearch()" autofocus>
    <div class="search-hint"><kbd>esc</kbd> to close <kbd>↑↓</kbd> to navigate <kbd>enter</kbd> to open</div>
  </div>
</div>

<script>
const T = localStorage.getItem('yuleosh_token');
const B = '';

async function api(path, opts={}) {
  const h = {'Content-Type':'application/json'};
  if (T) h['Authorization'] = 'Bearer ' + T;
  const r = await fetch(B + path, {headers:h, ...opts});
  return r.json();
}

async function load() {
  try {
    const s = await api('/api/auth/session');
    if (s.error) { window.location = '/'; return; }
    document.getElementById('headerOrg').textContent = s.org_name;
    document.getElementById('userEmail').textContent = s.email;
    
    const u = await api('/api/v1/usage');
    renderStats(u);
    renderTier(u);
    
    const p = await api('/api/project/list');
    renderProjects(p.projects || []);
    
    // Simulate activity (from recent pipeline runs)
    renderActivity();
  } catch(e) { console.error(e); }
}

function renderStats(u) {
  if (!u.usage) return;
  const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n);
  document.getElementById('statProjects').textContent = u.usage.projects.used;
  document.getElementById('statRuns').textContent = fmt(u.usage.pipeline_runs.used);
  document.getElementById('statTokens').textContent = fmt(u.usage.llm_tokens.used);
  
  if (u.usage.projects.limit) document.getElementById('statProjectsLimit').textContent = `/ ${u.usage.projects.limit}`;
  if (u.usage.pipeline_runs.limit) document.getElementById('statRunsLimit').textContent = `/ ${u.usage.pipeline_runs.limit}`;
  if (u.usage.llm_tokens.limit) document.getElementById('statTokensLimit').textContent = `/ ${u.usage.llm_tokens.limit}`;

  // Mini chart — random bars for visual effect
  const chart = document.getElementById('runChart');
  if (chart) {
    chart.innerHTML = Array.from({length:12}, () => {
      const h = 20 + Math.random() * 20;
      return `<div class="bar" style="height:${h}px"></div>`;
    }).join('');
  }
}

function renderTier(u) {
  const badge = document.getElementById('headerTier');
  badge.textContent = (u.tier||'COMMUNITY').toUpperCase();
  if (u.trial?.in_trial) {
    document.getElementById('headerTrial').textContent = `${u.trial.days_left}d left in trial`;
  }
}

function renderProjects(projects) {
  const el = document.getElementById('projectList');
  if (!projects.length) {
    el.innerHTML = `
      <a href="/onboarding" class="project-card empty">
        <div class="empty-icon">＋</div>
        <div style="font-weight:600">Create your first project</div>
        <div style="font-size:12px;color:var(--text3)">Takes 30 seconds</div>
      </a>
    `;
    return;
  }
  el.innerHTML = projects.map(p => `
    <a href="/project/${p.slug}" class="project-card" onmousemove="handleCardHover(event, this)">
      <div class="project-icon">📦</div>
      <div class="project-name">${p.name}</div>
      <div class="project-slug">${p.slug}</div>
      <div class="project-meta">
        <span class="project-status"><span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span> Active</span>
        <span>${p.created_at ? p.created_at.slice(0,10) : ''}</span>
      </div>
    </a>
  `).join('');
}

function renderActivity() {
  const el = document.getElementById('activityFeed');
  const items = [
    {icon:'pass', emoji:'✓', text:'CI Layer 1 passed', time:'2 min ago', project:'vcu'},
    {icon:'pass', emoji:'✓', text:'Evidence pack generated', time:'15 min ago', project:'vcu'},
    {icon:'fail', emoji:'✗', text:'Cross-compile failed (arm)', time:'1 hour ago', project:'ble-module'},
  ];
  el.innerHTML = items.map(i => `
    <div class="activity-item">
      <div class="activity-icon ${i.icon}">${i.emoji}</div>
      <div>${i.text} <span style="color:var(--text3)">in ${i.project}</span></div>
      <div class="activity-time">${i.time}</div>
    </div>
  `).join('');
}

function handleCardHover(e, card) {
  const rect = card.getBoundingClientRect();
  card.style.setProperty('--mouse-x', e.clientX - rect.left + 'px');
  card.style.setProperty('--mouse-y', e.clientY - rect.top + 'px');
}

// Cmd+K search
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});
function openSearch() { document.getElementById('searchOverlay').classList.add('show'); document.getElementById('searchInput').focus(); }
function closeSearch(e) { if (!e || e.target === document.getElementById('searchOverlay')) document.getElementById('searchOverlay').classList.remove('show'); }

load();
</script>
</body>
</html>
