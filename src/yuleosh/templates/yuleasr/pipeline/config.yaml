# yuleOSH Pipeline Configuration — yuleASR AUTOSAR BSW
steps:
  - id: spec-parse
    name: Spec Parsing
    handler: spec_parse
  - id: requirements-analysis
    name: Requirements Analysis
    handler: super_analysis
  - id: sdd
    name: System Design Document
    handler: hermes_prd
  - id: code-gen
    name: Code Generation
    handler: claude_dev
  - id: internal-review
    name: Internal Review
    handler: internal_review
  - id: test-plan
    name: Test Plan Generation
    handler: test_planning
  - id: code-review
    name: Code Review
    handler: hermes_review
  - id: unit-test
    name: CI Layer 1
    handler: ci_layer1
  - id: cross-compile
    name: CI Layer 2 — yuleASR Cross Compile
    handler: ci_layer2
  - id: static-analysis
    name: MISRA C:2023 Static Analysis
    handler: static_analysis
  - id: system-verification
    name: CI Layer 3 — HW Test & Evidence
    handler: ci_layer3
ci_layers:
  L1:
    unit_test: true
    linter: true
    autosar_check: true
  L2:
    cross_compile: true
    misra_check: true
    bsw_config_check: true
  L3:
    hardware_test: true
    evidence_pack: true
    traceability_matrix: true
review_gates:
  - {type: internal, before: code-gen}
  - {type: autosar, before: static-analysis, name: yuleASR BSW Architecture Review}
  - {type: compliance, after: system-verification, name: ASPICE SYS/SWE Compliance Gate}
tools:
  cross_compiler: arm-none-eabi-gcc
  static_analyzer: cppcheck
  target_chip: S32K312
  yuleasr_home: "${YULEASR_HOME}"
