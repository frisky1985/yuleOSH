pipeline_config:
  default_steps: [spec-parse, requirements-analysis, sdd, code-gen, internal-review, test-plan, code-review, unit-test, cross-compile, static-analysis, system-verification]
  ci_layers: [L1, L2, L3]
yuleasr:
