  modules_services: [Com, ComM, Dcm, Dem, Det, EcuM, EcuC, BswM, SchM, NvM, PduR, CanM, CanSm, LinM, LinSm, LinTp, EthSm, FiM, IpduM, E2E, Crc, CryIf, Csm, KeyM, SecOC, SoAd, SomeIp, SomeIpTp, SomeIpXf, StbM, WdgM, Xcp, Dlt, J1939Nm, J1939Tp, UdpNm, MemIf, Mem, Nm, SwC, LnTm, Mqtt, RAMSafety, DoCan]
