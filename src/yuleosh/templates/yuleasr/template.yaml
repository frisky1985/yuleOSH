name: yuleasr
version: 1.0.0
description: yuleASR AUTOSAR BSW project — S32K312 with full MCAL+ECUAL+Services stack
platforms: [arm, s32k312, nxp]
tags: [autosar, bsw, mcal, ecual, services, s32k312, automotive, safety]
spec_sections:
  - System Requirements
  - MCAL Configuration
  - ECUAL Abstraction
  - Services Layer
  - RTE & SW-C
  - Diagnostic & Memory
  - Safety & Security
